version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      # cosign-installer v4 installs cosign v3, which breaks the goreleaser
      # sign-blob signing config (release.yml). Hold at v3 until the release is
      # migrated to the cosign v3 --bundle format.
      - dependency-name: "sigstore/cosign-installer"
        update-types: ["version-update:semver-major"]
