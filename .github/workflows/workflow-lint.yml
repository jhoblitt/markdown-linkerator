name: Workflow Lint

on:
  pull_request:
    paths:
      - ".github/**"
  push:
    branches: [main]
    paths:
      - ".github/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0

  pin-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify every action is pinned to a full commit SHA
        # Equivalent to `pinact run --check --no-api`: every `uses:` ref must end
        # in a 40-char SHA (local `./` and `docker://` refs are exempt).
        run: |
          fail=0
          while IFS= read -r ref; do
            case "$ref" in
              ./*|.|docker://*) continue ;;
            esac
            sha=${ref##*@}
            if ! printf '%s' "$sha" | grep -qE '^[0-9a-f]{40}$'; then
              echo "::error::not SHA-pinned: $ref"
              fail=1
            fi
          done < <(grep -rhoE '^\s*(-\s*)?uses:\s*\S+' .github/ | sed -E 's/.*uses:\s*//')
          [ "$fail" -eq 0 ] && echo "All action refs are SHA-pinned."
          exit $fail
