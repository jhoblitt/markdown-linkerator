# GoReleaser v2 configuration.
# Produces cross-compiled static binaries, checksums, SBOMs, cosign signatures,
# a multi-arch distroless OCI image on ghcr.io (via ko), and a GitHub Release.
version: 2

project_name: markdown-linkerator

before:
  hooks:
    - go mod download

builds:
  - id: markdown-linkerator
    main: ./cmd/markdown-linkerator
    binary: markdown-linkerator
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/jhoblitt/markdown-linkerator/internal/version.Version={{ .Version }}
      - -X github.com/jhoblitt/markdown-linkerator/internal/version.Commit={{ .FullCommit }}
      - -X github.com/jhoblitt/markdown-linkerator/internal/version.Date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

sboms:
  - id: archive
    artifacts: archive

# Multi-arch distroless image built by ko from the Go source (no Dockerfile).
kos:
  - id: image
    build: markdown-linkerator
    base_image: cgr.dev/chainguard/static
    repositories:
      - ghcr.io/jhoblitt/markdown-linkerator
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: spdx
    bare: true
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - "v{{ .Major }}"
      - "sha-{{ .ShortCommit }}"
      - "{{ if not .Prerelease }}latest{{ end }}"

# cosign keyless (OIDC) signature over the checksums file.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# cosign keyless signature over every pushed image.
docker_signs:
  - cmd: cosign
    artifacts: all
    args:
      - sign
      - "--yes"
      - "${artifact}"

release:
  github:
    owner: jhoblitt
    name: markdown-linkerator
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"
